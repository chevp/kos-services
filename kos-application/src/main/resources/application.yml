spring:
  application:
    name: kos-services
  datasource:
    url: jdbc:postgresql://localhost:5435/kos
    username: kos
    password: "${KOS_DB_PASSWORD:kos}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    locations: classpath:db/migration
  security:
    user:
      name: kosmos
      password: "${KOS_ADMIN_PASSWORD:changeme}"

server:
  port: 8080

kos:
  cors:
    allowed-origins: "${KOS_CORS_ORIGINS:http://localhost:5173}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
